<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 10px; font-family: sans-serif; }
    textarea { width: 100%; height: 120px; margin-bottom: 10px; }
    input { width: 93%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 10px; cursor: pointer; background: #4285f4; color: white; border: none; border-radius: 4px; font-weight: bold; }
    label { font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <label>Ссылки (каждая с новой строки):</label>
  <textarea id="links" placeholder="https://example.com/image.png"></textarea>
  
  <label>Расширение:</label>
  <input type="text" id="extInput" placeholder="jpeg/gif/jfif/...">
  
  <button id="downloadBtn">Скачать</button>
  <script src="popup.js"></script>
</body>
</html>
